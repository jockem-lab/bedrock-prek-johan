services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bedrock
      MYSQL_USER: bedrock
      MYSQL_PASSWORD: bedrock
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql

  php:
    image: php:8.2-fpm
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql mysqli &&
             php-fpm"

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  db_data:
