services:
  db:
    image: mysql:8.0
    container_name: franzon-bedrock-db-1
    environment:
      MYSQL_DATABASE: franzon
      MYSQL_USER: franzon
      MYSQL_PASSWORD: franzon
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql

  php:
    build: .
    container_name: franzon-bedrock-php-1
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: franzon-bedrock-nginx-1
    ports:
      - "8092:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  db_data:
